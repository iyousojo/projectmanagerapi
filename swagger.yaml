openapi: 3.0.0
info:
  title: Academic Project Management API
  version: 3.2.1
  description: Updated to match controller method names.

servers:
  - url: http://localhost:1000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        fullName: { type: string, example: "Solomon Iyoubhebhe" }
        email: { type: string, format: email, example: "user@aau.edu" }
        role: { type: string, enum: [student, admin, super-admin] }
        phone: { type: string, example: "+2348012345678" }
        gender: { type: string, enum: [Male, Female, Other] }

paths:
  # CHANGED FROM /signup TO /register TO MATCH auth.controller.js
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, phone]
              properties:
                fullName: { type: string }
                email: { type: string }
                password: { type: string }
                phone: { type: string }
                gender: { type: string, enum: [Male, Female, Other] }
                role: { type: string, enum: [student, admin] }
      responses:
        '201':
          description: Registration successful!

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
                expoPushToken: { type: string }
      responses:
        '200':
          description: Login success